<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Navbar</title>
    <link rel="icon" href="../image/fastracklogo.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .navbar {
        width: 100%;
        top: 0;
        position: fixed;
        z-index: 1000;
      }
      .navbar-wapper {
        display: flex;
        justify-content: space-between;
        background-color: rgb(216, 151, 104);
        align-items: center;
      }
      .navbar-logo-para {
        color: orangered;
        display: flex;
        font-size: 3rem;
        font-style: oblique;
        margin: 10px;
        gap: 20px;
      }
      .logo {
        width: 80px;
        height: 80px;
        border-radius: 100%;
      }
      .navbar-para {
        padding-top: 10px;
        font-family: "Dancing Script", cursive;
        font-optical-sizing: auto;
        font-weight: weight;
        font-style: normal;
      }
      .navbar-list {
        padding: 0 30px;
        display: flex;
        font-size: 18px;
      }
      .navbar-list li {
        list-style: none;
        font-style: italic;
        font-size: x-large;
      }
      .navbar-list li a {
        margin-left: 30px;
        text-decoration: none;
        color: rgb(219, 62, 5);
        position: relative;
      }
      .navbar-list li a::after {
        background-color: white;
        content: " ";
        position: absolute;
        transform: 0.3s;
        width: 0;
        height: 3px;
        bottom: -3px;
        left: 0;
      }
      .navbar-list li a:hover::after {
        width: 100%;
        color: blue;
      }
      .navbar-list li a:hover {
        color: blue;
      }
      .background {
        background-image: url(../image/backgroundwatchimage.jpg);
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        height: 100vh;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <section class="navbar">
      <div class="navbar-wapper">
        <div class="navbar-logo-para">
          <img class="logo" src="../image/fastracklogo.jpg" alt="" />
          <p class="navbar-para">Fastrack</p>
        </div>
        <ul class="navbar-list">
          <li><a href="#products">PRODUCTS</a></li>
          <li><a href="#maintenance">MAINTENANCE</a></li>
          <li><a href="#support">SUPPORT</a></li>
          <li><a href="#about">ABOUT</a></li>
          <li><a href="#contact">CONTACT</a></li>
        </ul>
      </div>
    </section>
    <section class="background"></section>
  </body>
</html>
