<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <style>
      *{
        margin: 0;
        padding: 0;
      }
      .main{
        background-image: url(../form.html/aesthetic\ image.jpg)
      }
        .container{
            justify-items: center;
            font-size: 1.5rem;
            background-repeat: no-repeat;
            background-position:center;
            background-size: cover;
           color: white;
        }
        .input{
        border: 2px solid aqua;
        padding: 0.5rem;
        border-radius: 0.3rem;
        margin-left: 25%;
        }
        .input:hover{
          background-color: aquamarine;
           border: 2px solid blue;
           transition: 0.5em;
            transform: scale(1.05);
        }
        .butt{
          text-align: center;
          margin: 1rem;
         padding: 5rem ;
         border-radius: 1rem;
        }
        .btn1{
          padding: 0.6rem;
          margin-left: 5%;
          width: 100px;
          font-size: large;
          font-weight: bold;
          box-shadow: 5px 5px 15px solid wheat;
           border-radius: 1rem;
        }
        .btn1:hover{
          background-color: aqua;
          border: 2px aqua;
          box-shadow: 0 0 10px white;
          transform: scale(1.05);
        }
        h1{
          margin-bottom: 5rem;
          margin-left: 10%;
          text-shadow: 5px 5px 15px white;
          color:chartreuse
        }
    
    </style>
  </head>
  <body>
    <section class="main">
      <div class="container">
        <form>
          <h1>Registration form</h1>
          <label for="first name">First Name :</label>
          <input class="input" type="text" placeholder="Enter First Name" />
          <br /><br />

          <label for="last name">Last Name :</label>
          <input class="input" type="text" placeholder="Enter Last Name" />
          <br /><br />

          <label for="email">Email :</label>
          <input class="input" type="text" placeholder="Enter Email Address" />
          <br /><br />

          <label for="password">Password :</label>
          <input class="input" type="password" />
          <br /><br />

          <label for="gender">Gender :</label>
          <input class="input" type="radio" name="gender" />Male
          <input class="input" type="radio" name="gender" />Female
          <input class="input" type="radio" name="gender" />Other <br /><br />

          <label for="age">Age :</label>
          <select class="input" name="age" id="age">
            <option value="placeholder">Select Age</option>
            <option value="option">10-15</option>
            <option value="option">15-20</option>
            <option value="option">20-25</option>
            <option value="option">25-30</option>
          </select>
          <br /><br />

          <label>Preferences :</label>
          <label>Acrylic Painting</label>
          <input type="checkbox" />
          <label>Oil painting</label>
          <input type="checkbox" />
          <label>Water Color Painting</label>
          <input type="checkbox" />
          <br /><br />

          <label for="occupation">occupation :</label>
          <select class="input" name="occupation" id="occupation">
            <option value="placeholder">Student</option>
            <option value="option">Engineering & Technology</option>
            <option value="option">Medical & Nursing</option>
            <option value="option">Arts & Humanities</option>
            <option value="option">Commerce & Business</option>
            <option value="option">Science(B.Sc/M.Sc)</option>
          </select>
          <br /><br />

          <label for="bio">Bio :</label>
          <textarea class="input" name="text" id="bio">
Share few lines about yourself...</textarea
          >
          <br /><br />
          <div class="butt">
            <button class=" btn1">RESET</button>
            <button class=" btn1">SUBMIT</button>
          </div>
        </form>
      </div>
    </section>
  </body>
</html>
