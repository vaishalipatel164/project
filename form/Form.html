<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      .main {
        min-height: 100vh;
        background-image: url(../form/aesthetic\ image.jpg);
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        padding: 2rem 3rem;
        border-radius: 1rem;
        color: white;
        width: 700px;
      }

      h1 {
        text-align: center;
        margin-bottom: 2rem;
        color: chartreuse;
        text-shadow: 0 0 10px white;
      }

      .form-group {
        display: flex;
        align-items: center;
        margin: 1rem 0;
        gap: 20px;
      }

      .form-group label {
        width: 180px;
        font-weight: bold;
      }

      .input {
        flex: 1;
        border: 2px solid aqua;
        padding: 0.7rem;
        border-radius: 0.5rem;
        outline: none;
        font-size: 1rem;
      }

      .input:hover {
        background-color: aquamarine;
        border: 2px solid blue;
        transition: 0.3s;
        transform: scale(1.02);
      }

      .radio-group,
      .checkbox-group {
        display: flex;
        gap: 15px;
        align-items: center;
        flex-wrap: wrap;
      }

      textarea.input {
        resize: none;
        height: 100px;
      }

      .butt {
        text-align: center;
        margin-top: 2rem;
      }

      .btn1 {
        padding: 0.8rem 1.5rem;
        width: 120px;
        font-size: 1rem;
        font-weight: bold;
        border: none;
        border-radius: 1rem;
        cursor: pointer;
        margin: 0 10px;
        transition: 0.3s;
      }

      .btn1:hover {
        background-color: aqua;
        box-shadow: 0 0 10px white;
        transform: scale(1.05);
      }
    </style>
  </head>

  <body>
    <section class="main">
      <div class="container">
        <form>
          <h1>Registration Form</h1>

          <div class="form-group">
            <label>First Name :</label>
            <input class="input" type="text" placeholder="Enter First Name" />
          </div>

          <div class="form-group">
            <label>Last Name :</label>
            <input class="input" type="text" placeholder="Enter Last Name" />
          </div>

          <div class="form-group">
            <label>Email :</label>
            <input
              class="input"
              type="email"
              placeholder="Enter Email Address"
            />
          </div>

          <div class="form-group">
            <label>Password :</label>
            <input class="input" type="password" />
          </div>

          <div class="form-group">
            <label>Gender :</label>

            <div class="radio-group">
              <input type="radio" name="gender" /> Male

              <input type="radio" name="gender" /> Female

              <input type="radio" name="gender" /> Other
            </div>
          </div>

          <div class="form-group">
            <label>Age :</label>

            <select class="input">
              <option>Select Age</option>
              <option>10-15</option>
              <option>15-20</option>
              <option>20-25</option>
              <option>25-30</option>
            </select>
          </div>

          <div class="form-group">
            <label>Preferences :</label>

            <div class="checkbox-group">
              <input type="checkbox" /> Acrylic Painting

              <input type="checkbox" /> Oil Painting

              <input type="checkbox" /> Water Color Painting
            </div>
          </div>

          <div class="form-group">
            <label>Occupation :</label>

            <select class="input">
              <option>Student</option>
              <option>Engineering & Technology</option>
              <option>Medical & Nursing</option>
              <option>Arts & Humanities</option>
              <option>Commerce & Business</option>
              <option>Science(B.Sc/M.Sc)</option>
            </select>
          </div>

          <div class="form-group">
            <label>Bio :</label>

            <textarea class="input" placeholder="Share few lines about yourself..."></textarea>
          </div>

          <div class="butt">
            <button type="reset" class="btn1">RESET</button>

            <button type="submit" class="btn1">SUBMIT</button>
          </div>
        </form>
      </div>
    </section>
  </body>
</html>
