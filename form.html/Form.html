<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <div class="">
      <form class="">
        <h1>Registration form</h1>
        <label for="first name">First Name:</label>
        <input type="text" placeholder="Enter First Name" />
        <br /><br />

        <label for="last name">Last Name:</label>
        <input type="text" placeholder="Enter Last Name" />
        <br /><br />

        <label for="email">Email:</label>
        <input type="text" placeholder="Enter Email Address" />
        <br /><br />

        <label for="password">Password:</label>
        <input type="password" />
        <br /><br />

        <label for="gender">Gender:</label>
        <input type="radio" name="gender" />Male
        <input type="radio" name="gender" />Female
        <input type="radio" name="gender" />Other <br /><br />

        <label for="age">Age:</label>
        <select name="age" id="age">
          <option value="placeholder">Select Age</option>
          <option value="option">10-15</option>
          <option value="option">15-20</option>
          <option value="option">20-25</option>
          <option value="option">25-30</option>
        </select>
        <br /><br />

        <label>Preferences:</label>
        <label>Acrylic Painting</label>
        <input type="checkbox" />
        <label>Oil painting</label>
        <input type="checkbox" />
        <label>Water Color Painting</label>
        <input type="checkbox" />
        <br /><br />

        <label for="occupation">occupation:</label>
        <select name="occupation" id="occupation">
        <option value="placeholder">Student</option>
        <option value="option">Engineering & Technology</option>
        <option value="option">Medical & Nursing</option>
        <option value="option">Arts & Humanities</option>
        <option value="option">Commerce & Business</option>
        <option value="option">Science(B.Sc/M.Sc)</option>
        </select>
      </form>
    </div>
  </body>
</html>
