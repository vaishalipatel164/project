<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<style>
    table,tr,td,th{
        border: 1px solid black;
        border-collapse: collapse;
        color: skyblue;
        padding: 5px 22px;
       
    }
.head th{
    color: rgb(144, 144, 158);
    background-color: rgb(11, 11, 82);
}
.head-col{
    color: rgb(202, 26, 26);
}

}
.head1{

}
h1{

}
p{
    color:crimson;
}
td:hover{
    background-color: yellow;
    transform: scale(1.03);
}
</style>
